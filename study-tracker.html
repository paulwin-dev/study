<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300;1,9..144,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;
  --surface:#14171f;
  --surface2:#1c2030;
  --surface3:#242840;
  --border:#2a2f45;
  --border2:#353c58;
  --text:#e8eaf4;
  --text2:#8b92b8;
  --text3:#565d80;
  --accent:#6c7fff;
  --accent2:#4f5cdb;
  --gold:#e8b84b;
  --danger:#e05c5c;
  --success:#4ec994;
  --warn:#e89a3c;
  --r:10px;
  --r2:16px;
  --font-head:'Fraunces',serif;
  --font-mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:14px;line-height:1.6}
button{font-family:var(--font-mono);cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:var(--font-mono);background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--r);padding:8px 12px;font-size:13px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--surface2)}
h1,h2,h3{font-family:var(--font-head);font-weight:500}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0}
.logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.logo h1{font-size:22px;color:var(--accent);letter-spacing:-0.5px}
.logo span{font-size:11px;color:var(--text3);display:block;margin-top:2px}
.nav{flex:1;padding:12px 10px;display:flex;flex-direction:column;gap:2px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;color:var(--text2);font-size:12px;font-weight:400;letter-spacing:0.3px;transition:all 0.15s;text-align:left;width:100%}
.nav-btn svg{opacity:0.7;flex-shrink:0}
.nav-btn:hover{background:var(--surface2);color:var(--text)}
.nav-btn.active{background:var(--surface3);color:var(--accent)}
.nav-btn.active svg{opacity:1}
.sidebar-bottom{padding:14px 10px;border-top:1px solid var(--border)}
.streak-pill{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;display:flex;align-items:center;gap:8px;color:var(--text2)}
.streak-pill .fire{font-size:15px}

/* MAIN */
#main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{height:56px;min-height:56px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px}
.topbar h2{font-family:var(--font-head);font-size:18px;font-weight:500;flex:1}
.content{flex:1;overflow-y:auto;padding:24px}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.card-sm{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:8px;font-size:12px;font-family:var(--font-mono);font-weight:500;transition:all 0.15s;cursor:pointer;border:1px solid transparent}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger)}
.btn-danger:hover{background:rgba(224,92,92,0.1)}
.btn-success{background:var(--success);color:#0d1a12;border-color:var(--success)}
.btn-success:hover{opacity:0.9}
.btn-lg{padding:12px 24px;font-size:14px}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-icon{padding:7px;border-radius:8px;color:var(--text2);border-color:var(--border)}
.btn-icon:hover{background:var(--surface2);color:var(--text)}

/* STAT CARDS */
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.stat-label{font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.stat-value{font-size:24px;font-family:var(--font-head);font-weight:500;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;letter-spacing:0.3px}
.badge-accent{background:rgba(108,127,255,0.15);color:var(--accent)}
.badge-gold{background:rgba(232,184,75,0.15);color:var(--gold)}
.badge-success{background:rgba(78,201,148,0.15);color:var(--success)}
.badge-danger{background:rgba(224,92,92,0.15);color:var(--danger)}
.badge-warn{background:rgba(232,154,60,0.15);color:var(--warn)}
.badge-gray{background:var(--surface3);color:var(--text3)}

/* TIMER VIEW */
#timer-view{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:40px 24px;min-height:100%}
.timer-ring-wrap{position:relative;width:240px;height:240px}
.timer-display{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.timer-digits{font-size:44px;font-family:var(--font-head);font-weight:300;letter-spacing:-2px;color:var(--text)}
.timer-label{font-size:11px;color:var(--text3);letter-spacing:1px}
.timer-controls{display:flex;align-items:center;gap:12px}
.timer-btn-big{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all 0.2s}
.timer-btn-start{background:var(--accent);color:#fff}
.timer-btn-start:hover{background:var(--accent2);transform:scale(1.05)}
.timer-btn-pause{background:var(--surface3);color:var(--text)}
.timer-btn-pause:hover{background:var(--border2)}
.timer-btn-stop{background:transparent;color:var(--danger);border:2px solid var(--danger);width:48px;height:48px}
.timer-btn-stop:hover{background:rgba(224,92,92,0.1)}
.subject-select-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:440px}
.subj-chip{padding:7px 14px;border-radius:20px;font-size:12px;border:2px solid transparent;cursor:pointer;transition:all 0.2s;font-family:var(--font-mono)}
.subj-chip:hover{opacity:0.85;transform:scale(1.03)}
.subj-chip.selected{border-color:#fff;transform:scale(1.06)}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-day-name{text-align:center;font-size:10px;color:var(--text3);padding:4px;letter-spacing:1px;text-transform:uppercase}
.cal-day{min-height:80px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;transition:all 0.15s;position:relative}
.cal-day:hover{border-color:var(--border2);background:var(--surface2)}
.cal-day.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.cal-day.past{opacity:0.6}
.cal-day.rest{background:var(--bg)}
.cal-day.rest .cal-day-num{color:var(--text3)}
.cal-day-num{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
.cal-day.today .cal-day-num{color:var(--accent);font-weight:600}
.cal-session-chip{font-size:9px;padding:2px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-milestone{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(232,184,75,0.15);color:var(--gold);border:1px solid rgba(232,184,75,0.3)}
.cal-rollover-dot{position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--warn)}

/* CALENDAR NAV */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-nav h3{font-family:var(--font-head);font-size:20px;font-weight:500}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:28px;width:460px;max-width:94vw;max-height:90vh;overflow-y:auto}
.modal h3{font-family:var(--font-head);font-size:20px;font-weight:500;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;color:var(--text3);letter-spacing:0.5px;margin-bottom:6px;text-transform:uppercase}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:16px;border-top:1px solid var(--border)}
.color-picker{display:flex;gap:8px;flex-wrap:wrap}
.color-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.15s}
.color-dot.selected{border-color:#fff;transform:scale(1.15)}
.color-dot:hover{transform:scale(1.1)}

/* SUBJECTS VIEW */
.subject-row{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;transition:all 0.15s}
.subject-row:hover{border-color:var(--border2)}
.subject-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.subject-info{flex:1}
.subject-name{font-weight:500;font-size:14px}
.subject-stats{font-size:11px;color:var(--text3);margin-top:2px}
.subject-actions{display:flex;gap:6px}

/* PROGRESS */
.progress-wrap{background:var(--surface2);border-radius:20px;height:6px;overflow:hidden}
.progress-bar{height:100%;border-radius:20px;transition:width 0.4s ease}

/* SESSIONS LIST */
.session-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.session-row .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.session-info{flex:1;font-size:12px}
.session-time{font-size:11px;color:var(--text3)}
.rollover-tag{font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(232,154,60,0.15);color:var(--warn);border:1px solid rgba(232,154,60,0.3)}

/* WEEKLY CARD */
.week-bar-wrap{display:flex;align-items:flex-end;gap:6px;height:80px}
.week-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.week-bar-track{width:100%;background:var(--surface3);border-radius:4px;flex:1;position:relative;overflow:hidden}
.week-bar-fill{position:absolute;bottom:0;left:0;right:0;border-radius:4px;transition:height 0.5s ease}
.week-bar-label{font-size:9px;color:var(--text3);letter-spacing:0.5px}

/* NOTIFICATION */
.notif{position:fixed;top:20px;right:20px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);padding:14px 18px;font-size:12px;color:var(--text);z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.5);transform:translateX(120%);transition:transform 0.3s ease;max-width:300px}
.notif.show{transform:translateX(0)}
.notif-title{font-weight:500;margin-bottom:4px}

/* RING SVG */
.ring-bg{fill:none;stroke:var(--surface3);stroke-width:8}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 0.5s ease}
.ring-track{transform:rotate(-90deg);transform-origin:center}

/* HISTORY */
.hist-day{margin-bottom:16px}
.hist-day-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;cursor:pointer;user-select:none}
.hist-day-header:hover{border-color:var(--border2)}
.hist-day-content{padding:12px 0 0;display:none}
.hist-day-content.open{display:block}

/* DEBT BANNER */
.debt-banner{background:rgba(232,154,60,0.08);border:1px solid rgba(232,154,60,0.25);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:20px}
.debt-banner .icon{font-size:20px}
.debt-text{flex:1;font-size:12px;color:var(--warn)}
.debt-text strong{display:block;font-size:13px;margin-bottom:2px}

/* CRASH RESTORE */
.restore-banner{background:rgba(108,127,255,0.08);border:1px solid rgba(108,127,255,0.3);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:20px}

.empty{text-align:center;padding:48px 24px;color:var(--text3);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:12px}
.empty p{line-height:1.8}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="logo">
      <h1>study.</h1>
      <span id="today-date"></span>
    </div>
    <nav class="nav" id="nav">
      <button class="nav-btn active" data-view="dashboard">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </button>
      <button class="nav-btn" data-view="timer">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12,6 12,12 16,14"/></svg>
        Focus Timer
      </button>
      <button class="nav-btn" data-view="calendar">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Calendar
      </button>
      <button class="nav-btn" data-view="subjects">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        Subjects
      </button>
      <button class="nav-btn" data-view="history">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12,7 12,12 9,15"/><line x1="3.05" y1="11" x2="5.05" y2="11"/><line x1="18.95" y1="11" x2="20.95" y2="11"/></svg>
        History
      </button>
    </nav>
    <div class="sidebar-bottom">
      <div class="streak-pill">
        <span class="fire">🔥</span>
        <span id="main-streak-label">0 day streak</span>
      </div>
    </div>
  </aside>

  <main id="main">
    <div class="topbar">
      <h2 id="view-title">Dashboard</h2>
      <div id="topbar-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<!-- Modals -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()"></div>
</div>

<div id="notif" class="notif">
  <div class="notif-title" id="notif-title"></div>
  <div id="notif-body"></div>
</div>

<script>
const COLORS = ['#6c7fff','#4ec994','#e05c5c','#e89a3c','#e8b84b','#c97fff','#ff7fa2','#4ec4e8','#8bc94e','#ff9a6c'];
const STORAGE_KEY = 'studytracker_v2';
let state = loadState();
let currentView = 'dashboard';
let timerInterval = null;
let notifTimeout = null;
let scheduledNotifs = [];

function defaultState() {
  return {
    subjects: [],
    days: {},
    timer: { running: false, subjectId: null, startedAt: null, elapsed: 0, paused: false, pausedAt: null },
    xp: 0,
    nextSubjectId: 1,
    calendarOffset: 0,
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return Object.assign(defaultState(), JSON.parse(raw));
  } catch(e) {}
  return defaultState();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function todayKey() {
  return dateKey(new Date());
}

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function keyToDate(key) {
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y, m-1, d);
}

function getDay(key) {
  if (!state.days[key]) state.days[key] = { planned: [], logged: [], milestones: [], rollovers: [], notes: {} };
  return state.days[key];
}

function formatTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatHM(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  if (h > 0 && m > 0) return `${h}h ${m}m`;
  if (h > 0) return `${h}h`;
  if (m > 0) return `${m}m`;
  return `${secs}s`;
}

function getSubject(id) {
  return state.subjects.find(s => s.id === id);
}

// --- ROLLOVER LOGIC ---
function processRollovers() {
  const today = todayKey();
  const keys = Object.keys(state.days).sort();
  for (const key of keys) {
    if (key >= today) continue;
    const day = state.days[key];
    if (day._rolled) continue;
    day._rolled = true;
    for (const plan of day.planned) {
      const logged = getLoggedForSubjectOnDay(key, plan.subjectId);
      const remaining = Math.max(0, plan.duration - logged);
      if (remaining > 60) {
        const nextDay = nextDateKey(key);
        const nd = getDay(nextDay);
        nd.rollovers = nd.rollovers || [];
        nd.rollovers.push({ subjectId: plan.subjectId, duration: remaining, from: key });
      }
    }
  }
  save();
}

function nextDateKey(key) {
  const d = keyToDate(key);
  d.setDate(d.getDate() + 1);
  return dateKey(d);
}

function getLoggedForSubjectOnDay(key, subjectId) {
  const day = state.days[key];
  if (!day) return 0;
  return (day.logged || []).filter(l => l.subjectId === subjectId).reduce((a, l) => a + l.duration, 0);
}

function getTotalLoggedOnDay(key) {
  const day = state.days[key];
  if (!day) return 0;
  return (day.logged || []).reduce((a, l) => a + l.duration, 0);
}

function getTotalPlannedOnDay(key) {
  const day = state.days[key];
  if (!day) return 0;
  const planned = (day.planned || []).reduce((a, p) => a + p.duration, 0);
  const rollovers = (day.rollovers || []).reduce((a, r) => a + r.duration, 0);
  return planned + rollovers;
}

function isDayComplete(key) {
  return getTotalLoggedOnDay(key) >= getTotalPlannedOnDay(key) && getTotalPlannedOnDay(key) > 0;
}

function isDayRest(key) {
  return getTotalPlannedOnDay(key) === 0;
}

// --- STREAKS ---
function computeStreaks() {
  const today = todayKey();
  let mainStreak = 0;
  const keys = Object.keys(state.days).filter(k => k <= today).sort().reverse();
  for (const key of keys) {
    if (isDayRest(key) || isDayComplete(key)) mainStreak++;
    else break;
  }
  return mainStreak;
}

function computeSubjectStreak(subjectId) {
  const today = todayKey();
  let streak = 0;
  const keys = Object.keys(state.days).filter(k => k <= today).sort().reverse();
  for (const key of keys) {
    if (isDayRest(key)) { streak++; continue; }
    const plan = (state.days[key].planned || []).find(p => p.subjectId === subjectId);
    if (!plan) { streak++; continue; }
    const logged = getLoggedForSubjectOnDay(key, subjectId);
    if (logged >= plan.duration) streak++;
    else break;
  }
  return streak;
}

function getTotalDebt() {
  const today = todayKey();
  let debt = 0;
  for (const key of Object.keys(state.days)) {
    if (key > today) continue;
    const day = state.days[key];
    for (const r of (day.rollovers || [])) {
      const logged = getLoggedForSubjectOnDay(key, r.subjectId);
      const needed = r.duration;
      debt += Math.max(0, needed - logged);
    }
  }
  return debt;
}

function getTotalXP() {
  return state.xp || 0;
}

// --- NOTIFICATIONS ---
function scheduleNotifications() {
  scheduledNotifs.forEach(t => clearTimeout(t));
  scheduledNotifs = [];
  const today = todayKey();
  const day = state.days[today];
  if (!day) return;
  const now = new Date();
  for (const plan of (day.planned || [])) {
    if (!plan.startTime) continue;
    const [h, m] = plan.startTime.split(':').map(Number);
    const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
    const diff = target - now;
    if (diff > 0 && diff < 24*3600*1000) {
      const sub = getSubject(plan.subjectId);
      const t = setTimeout(() => {
        showNotif(`⏰ Time to study ${sub ? sub.name : 'Unknown'}!`, `Scheduled session starting now. You have 15 minutes grace period.`);
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification(`Study Time: ${sub ? sub.name : ''}`, { body: `Your session starts now!` });
        }
      }, diff);
      scheduledNotifs.push(t);
    }
  }
}

function showNotif(title, body, dur = 4000) {
  const el = document.getElementById('notif');
  document.getElementById('notif-title').textContent = title;
  document.getElementById('notif-body').textContent = body;
  el.classList.add('show');
  if (notifTimeout) clearTimeout(notifTimeout);
  notifTimeout = setTimeout(() => el.classList.remove('show'), dur);
}

// --- TIMER ---
function getTimerElapsed() {
  if (!state.timer.running) return state.timer.elapsed;
  if (state.timer.paused) return state.timer.elapsed;
  return state.timer.elapsed + Math.floor((Date.now() - state.timer.startedAt) / 1000);
}

function startTimer(subjectId) {
  state.timer = { running: true, subjectId, startedAt: Date.now(), elapsed: 0, paused: false };
  save();
  startTimerTick();
}

function pauseTimer() {
  if (!state.timer.running || state.timer.paused) return;
  state.timer.elapsed = getTimerElapsed();
  state.timer.paused = true;
  state.timer.pausedAt = Date.now();
  save();
}

function resumeTimer() {
  if (!state.timer.paused) return;
  state.timer.startedAt = Date.now();
  state.timer.paused = false;
  save();
}

function stopTimer() {
  const elapsed = getTimerElapsed();
  const subjectId = state.timer.subjectId;
  state.timer = { running: false, subjectId: null, startedAt: null, elapsed: 0, paused: false };
  clearInterval(timerInterval); timerInterval = null;
  save();

  if (elapsed < 300) {
    showNotif('Session too short', 'Sessions under 5 minutes are not counted.');
    return;
  }

  const today = todayKey();
  const day = getDay(today);
  day.logged = day.logged || [];
  day.logged.push({ subjectId, duration: elapsed, at: Date.now() });

  const xpEarned = Math.floor(elapsed / 60) * 2;
  state.xp = (state.xp || 0) + xpEarned;

  // Check if zero-rollover day bonus
  const totalRollover = (day.rollovers || []).reduce((a, r) => a + r.duration, 0);
  if (isDayComplete(today) && totalRollover === 0) {
    state.xp += 50;
    showNotif('🎉 Day Complete!', `+${xpEarned} XP earned. +50 bonus XP for zero-rollover day!`, 5000);
  } else {
    showNotif('✓ Session saved', `+${xpEarned} XP — ${formatHM(elapsed)} logged`);
  }

  save();
  render();
}

function startTimerTick() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (currentView === 'timer') renderTimerView();
  }, 1000);
}

// Check for crash restore
function checkCrashRestore() {
  if (state.timer.running && state.timer.startedAt) {
    return true;
  }
  return false;
}

// --- VIEWS ---
function setView(v) {
  currentView = v;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
  const titles = { dashboard: 'Dashboard', timer: 'Focus Timer', calendar: 'Calendar', subjects: 'Subjects', history: 'History' };
  document.getElementById('view-title').textContent = titles[v] || v;
  render();
}

function render() {
  updateSidebarStreak();
  const content = document.getElementById('content');
  const topbarActions = document.getElementById('topbar-actions');
  topbarActions.innerHTML = '';

  switch(currentView) {
    case 'dashboard': renderDashboard(content, topbarActions); break;
    case 'timer': renderTimerView(content); break;
    case 'calendar': renderCalendar(content, topbarActions); break;
    case 'subjects': renderSubjects(content, topbarActions); break;
    case 'history': renderHistory(content); break;
  }
}

function updateSidebarStreak() {
  const s = computeStreaks();
  document.getElementById('main-streak-label').textContent = `${s} day${s !== 1 ? 's' : ''} streak`;
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

// --- DASHBOARD ---
function renderDashboard(el, topbar) {
  processRollovers();
  const today = todayKey();
  const day = getDay(today);
  const totalPlanned = getTotalPlannedOnDay(today);
  const totalLogged = getTotalLoggedOnDay(today);
  const pct = totalPlanned > 0 ? Math.min(100, Math.round(totalLogged / totalPlanned * 100)) : 0;
  const streak = computeStreaks();
  const debt = getTotalDebt();
  const xp = getTotalXP();

  // Weekly data
  const weeklyData = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = dateKey(d);
    weeklyData.push({ key: k, day: d.toLocaleDateString('en-US', { weekday: 'short' }), planned: getTotalPlannedOnDay(k), logged: getTotalLoggedOnDay(k) });
  }
  const maxWeekly = Math.max(...weeklyData.map(w => Math.max(w.planned, w.logged)), 3600);

  let crashRestore = '';
  if (checkCrashRestore()) {
    const sub = getSubject(state.timer.subjectId);
    crashRestore = `<div class="restore-banner">
      <div style="font-size:20px">⚡</div>
      <div style="flex:1;font-size:12px;color:var(--accent)"><strong style="display:block;margin-bottom:4px">Session in progress</strong>A ${sub ? sub.name : 'timer'} session is running. <a href="#" onclick="setView('timer');return false" style="color:var(--accent);text-decoration:underline">Resume timer →</a></div>
    </div>`;
  }

  let debtBanner = '';
  if (debt > 60) {
    debtBanner = `<div class="debt-banner"><div class="icon">⚠️</div><div class="debt-text"><strong>Study Debt: ${formatHM(debt)}</strong>Uncleared hours rolled over from previous days.</div></div>`;
  }

  const todaySessions = (day.logged || []).map(l => {
    const sub = getSubject(l.subjectId);
    if (!sub) return '';
    return `<div class="session-row"><div class="dot" style="background:${sub.color}"></div><div class="session-info"><span style="color:var(--text)">${sub.name}</span><span style="color:var(--text3)"> — ${formatHM(l.duration)}</span></div><div class="session-time">${new Date(l.at).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}</div></div>`;
  }).join('');

  const todayPlan = [...(day.planned || []).map(p => ({...p, isRollover:false})), ...(day.rollovers || []).map(r => ({...r, isRollover:true}))];
  const planHtml = todayPlan.length ? todayPlan.map(p => {
    const sub = getSubject(p.subjectId);
    if (!sub) return '';
    const logged = getLoggedForSubjectOnDay(today, p.subjectId);
    const pct2 = Math.min(100, Math.round(logged / p.duration * 100));
    return `<div class="card-sm" style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div class="subject-dot" style="background:${sub.color}"></div>
        <div style="flex:1;font-size:13px;font-weight:500">${sub.name}</div>
        ${p.isRollover ? '<span class="rollover-tag">rollover</span>' : ''}
        <div style="font-size:11px;color:var(--text3)">${formatHM(logged)} / ${formatHM(p.duration)}</div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct2}%;background:${sub.color};opacity:${p.isRollover ? '0.6' : '1'}"></div></div>
    </div>`;
  }).join('') : `<div style="font-size:12px;color:var(--text3);padding:12px 0">No sessions planned today — rest day! 🌿</div>`;

  const weekBars = weeklyData.map(w => {
    const ph = w.planned > 0 ? Math.round(w.planned / maxWeekly * 60) : 0;
    const lh = w.logged > 0 ? Math.round(w.logged / maxWeekly * 60) : 0;
    const isToday = w.key === today;
    return `<div class="week-bar-col">
      <div class="week-bar-track">
        <div class="week-bar-fill" style="height:${ph}px;background:var(--surface3)"></div>
        <div class="week-bar-fill" style="height:${lh}px;background:var(--accent);opacity:0.9;${isToday ? '' : ''}"></div>
      </div>
      <div class="week-bar-label" style="${isToday ? 'color:var(--accent)' : ''}">${w.day}</div>
    </div>`;
  }).join('');

  el.innerHTML = `
  ${crashRestore}${debtBanner}
  <div class="grid4" style="margin-bottom:20px">
    <div class="stat"><div class="stat-label">Today</div><div class="stat-value">${pct}%</div><div class="stat-sub">${formatHM(totalLogged)} of ${formatHM(totalPlanned)}</div></div>
    <div class="stat"><div class="stat-label">Streak</div><div class="stat-value">${streak}</div><div class="stat-sub">days in a row</div></div>
    <div class="stat"><div class="stat-label">XP</div><div class="stat-value">${xp.toLocaleString()}</div><div class="stat-sub">total earned</div></div>
    <div class="stat"><div class="stat-label">Debt</div><div class="stat-value" style="${debt > 0 ? 'color:var(--warn)' : ''}">${formatHM(debt)}</div><div class="stat-sub">study debt</div></div>
  </div>
  <div class="grid2" style="margin-bottom:20px">
    <div>
      <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Today's Plan</div>
      ${planHtml}
      <button class="btn btn-ghost" style="margin-top:8px;font-size:11px" onclick="setView('calendar')">+ Plan sessions →</button>
    </div>
    <div>
      <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">This Week</div>
      <div class="week-bar-wrap" style="height:80px">${weekBars}</div>
      <div style="display:flex;align-items:center;gap:16px;margin-top:12px;font-size:10px;color:var(--text3)">
        <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--surface3);margin-right:4px"></span>Planned</span>
        <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--accent);margin-right:4px"></span>Logged</span>
      </div>
    </div>
  </div>
  <div>
    <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Today's Sessions</div>
    ${todaySessions || '<div style="font-size:12px;color:var(--text3);padding:12px 0">No sessions logged yet. <button class="btn btn-ghost btn-sm" onclick="setView(\'timer\')">Start timer →</button></div>'}
  </div>`;
}

// --- TIMER ---
function renderTimerView(el) {
  if (currentView !== 'timer') return;
  el = el || document.getElementById('content');

  const running = state.timer.running;
  const elapsed = getTimerElapsed();
  const sub = running ? getSubject(state.timer.subjectId) : null;
  const color = sub ? sub.color : 'var(--accent)';

  const MAX_SESSION = 7200;
  const pct = Math.min(1, elapsed / MAX_SESSION);
  const R = 104; const C = 2 * Math.PI * R;
  const dashOffset = C * (1 - pct);

  const activeSubjects = state.subjects.filter(s => !s.archived);

  if (!running && !el.querySelector('#timer-view')) {
    el.innerHTML = `<div id="timer-view">
      ${checkCrashRestore() ? `<div class="restore-banner" style="max-width:440px;width:100%">
        <div style="font-size:20px">⚡</div>
        <div style="flex:1;font-size:12px;color:var(--accent)">
          <strong style="display:block;margin-bottom:4px">Restore previous session?</strong>
          A session was interrupted. <button class="btn btn-ghost btn-sm" onclick="resumeCrashSession()">Restore</button> <button class="btn btn-ghost btn-sm" onclick="discardCrashSession()">Discard</button>
        </div>
      </div>` : ''}
      <div style="font-size:13px;color:var(--text3)">Select a subject to begin</div>
      <div class="subject-select-grid" id="subject-select"></div>
      <button class="btn btn-primary btn-lg" id="start-btn" onclick="handleTimerStart()" style="opacity:0.4;pointer-events:none">▶ Start Session</button>
    </div>`;
    renderSubjectChips();
  } else if (running) {
    el.innerHTML = `<div id="timer-view">
      <div style="font-size:13px;color:var(--text2);font-style:italic">${sub ? sub.name : '?'}</div>
      <div class="timer-ring-wrap">
        <svg viewBox="0 0 240 240" width="240" height="240">
          <circle class="ring-bg" cx="120" cy="120" r="${R}"/>
          <circle class="ring-fill ring-track" cx="120" cy="120" r="${R}" stroke="${color}" stroke-dasharray="${C}" stroke-dashoffset="${dashOffset}"/>
        </svg>
        <div class="timer-display">
          <div class="timer-digits">${formatTime(elapsed)}</div>
          <div class="timer-label">${state.timer.paused ? 'PAUSED' : 'RUNNING'}</div>
        </div>
      </div>
      <div class="timer-controls">
        <button class="btn btn-icon timer-btn-big timer-btn-stop" onclick="stopTimer()" title="Stop">■</button>
        <button class="btn timer-btn-big ${state.timer.paused ? 'timer-btn-start' : 'timer-btn-pause'}" onclick="${state.timer.paused ? 'resumeTimer()' : 'pauseTimer()'}" style="background:${state.timer.paused ? color : 'var(--surface3)'};color:${state.timer.paused ? '#fff' : 'var(--text)'}" >
          ${state.timer.paused ? '▶' : '⏸'}
        </button>
      </div>
      <div style="font-size:11px;color:var(--text3)">${elapsed < 300 ? `${300 - elapsed}s until session counts` : 'Session active — good work!'}</div>
    </div>`;
    if (!timerInterval) startTimerTick();
  }
}

function renderSubjectChips() {
  const container = document.getElementById('subject-select');
  if (!container) return;
  const active = state.subjects.filter(s => !s.archived);
  container.innerHTML = active.map(s => `
    <button class="subj-chip" data-id="${s.id}" style="background:${s.color}22;color:${s.color};border-color:${s.color}44" onclick="selectTimerSubject(${s.id})">
      ${s.name}
    </button>`).join('');
  if (!active.length) container.innerHTML = `<div class="empty"><p>No subjects yet.<br><button class="btn btn-ghost btn-sm" onclick="setView('subjects')">Create a subject →</button></p></div>`;
}

let selectedTimerSubject = null;
function selectTimerSubject(id) {
  selectedTimerSubject = id;
  document.querySelectorAll('.subj-chip').forEach(c => c.classList.toggle('selected', parseInt(c.dataset.id) === id));
  const btn = document.getElementById('start-btn');
  if (btn) { btn.style.opacity = '1'; btn.style.pointerEvents = 'auto'; }
}

function handleTimerStart() {
  if (!selectedTimerSubject) return;
  startTimer(selectedTimerSubject);
  render();
}

function resumeCrashSession() {
  state.timer.startedAt = Date.now() - (state.timer.elapsed * 1000);
  state.timer.paused = false;
  save(); render();
}

function discardCrashSession() {
  state.timer = { running: false, subjectId: null, startedAt: null, elapsed: 0, paused: false };
  save(); render();
}

// --- CALENDAR ---
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function renderCalendar(el, topbar) {
  const btn = document.createElement('button');
  btn.className = 'btn btn-primary';
  btn.innerHTML = '+ Add Milestone';
  btn.onclick = () => openMilestoneModal(todayKey());
  topbar.appendChild(btn);

  const today = new Date();
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth + 1, 0);
  const startDow = firstDay.getDay();

  const monthName = firstDay.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  let days = '';
  const dow = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const headerCells = dow.map(d => `<div class="cal-day-name">${d}</div>`).join('');

  for (let i = 0; i < startDow; i++) days += '<div></div>';

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(calYear, calMonth, d);
    const key = dateKey(date);
    const dayData = state.days[key] || {};
    const isToday = dateKey(date) === dateKey(today);
    const isPast = date < today && !isToday;
    const isRest = isDayRest(key);
    const hasRollover = (dayData.rollovers || []).length > 0;

    const sessions = [...(dayData.planned || []).map(p => ({...p, isRollover:false})), ...(dayData.rollovers || []).map(r => ({...r, isRollover:true}))].slice(0, 3).map(p => {
      const sub = getSubject(p.subjectId);
      if (!sub) return '';
      return `<div class="cal-session-chip" style="background:${sub.color}22;color:${sub.color};${p.isRollover ? 'opacity:0.7;border:1px solid '+sub.color+'44' : ''}">${sub.name} ${formatHM(p.duration)}</div>`;
    }).join('');

    const milestones = (dayData.milestones || []).map(m => `<div class="cal-milestone">🎯 ${m.label}</div>`).join('');

    days += `<div class="cal-day${isToday ? ' today' : ''}${isPast ? ' past' : ''}${isRest && !milestones && !sessions ? ' rest' : ''}" onclick="openDayModal('${key}')">
      <div class="cal-day-num">${d}</div>
      ${hasRollover ? '<div class="cal-rollover-dot" title="Has rollovers"></div>' : ''}
      ${sessions}${milestones}
    </div>`;
  }

  el.innerHTML = `
  <div class="cal-nav">
    <button class="btn btn-ghost btn-sm" onclick="calPrev()">← Prev</button>
    <h3>${monthName}</h3>
    <button class="btn btn-ghost btn-sm" onclick="calNext()">Next →</button>
  </div>
  <div class="cal-header">${headerCells}</div>
  <div class="cal-grid">${days}</div>`;
}

function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } render(); }
function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } render(); }

// --- SUBJECTS ---
function renderSubjects(el, topbar) {
  const btn = document.createElement('button');
  btn.className = 'btn btn-primary';
  btn.innerHTML = '+ New Subject';
  btn.onclick = openNewSubjectModal;
  topbar.appendChild(btn);

  const active = state.subjects.filter(s => !s.archived);
  const archived = state.subjects.filter(s => s.archived);

  if (!state.subjects.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📚</div><p>No subjects yet.<br>Create your first subject to start tracking.</p></div>`;
    return;
  }

  el.innerHTML = `
  <div style="margin-bottom:24px">
    <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Active Subjects</div>
    ${active.map(s => renderSubjectRow(s)).join('') || '<div style="font-size:12px;color:var(--text3)">No active subjects.</div>'}
  </div>
  ${archived.length ? `<div>
    <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Archived</div>
    ${archived.map(s => renderSubjectRow(s)).join('')}
  </div>` : ''}`;
}

function renderSubjectRow(s) {
  const today = todayKey();
  const logged = Object.keys(state.days).reduce((a, k) => a + getLoggedForSubjectOnDay(k, s.id), 0);
  const streak = computeSubjectStreak(s.id);
  return `<div class="subject-row">
    <div class="subject-dot" style="background:${s.color}"></div>
    <div class="subject-info">
      <div class="subject-name">${s.name}</div>
      <div class="subject-stats">${formatHM(logged)} total · ${streak} day streak${s.archived ? ' · archived' : ''}</div>
    </div>
    <div class="subject-actions">
      ${!s.archived ? `<button class="btn btn-ghost btn-sm" onclick="archiveSubject(${s.id})">Archive</button>` : `<button class="btn btn-ghost btn-sm" onclick="unarchiveSubject(${s.id})">Restore</button>`}
    </div>
  </div>`;
}

function archiveSubject(id) { const s = getSubject(id); if (s) s.archived = true; save(); render(); }
function unarchiveSubject(id) { const s = getSubject(id); if (s) s.archived = false; save(); render(); }

// --- HISTORY ---
function renderHistory(el) {
  processRollovers();
  const today = todayKey();
  const keys = Object.keys(state.days).filter(k => k < today).sort().reverse().slice(0, 60);

  if (!keys.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><p>No history yet.<br>Start logging sessions to see your past activity here.</p></div>`;
    return;
  }

  el.innerHTML = keys.map(key => {
    const d = keyToDate(key);
    const label = d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    const planned = getTotalPlannedOnDay(key);
    const logged = getTotalLoggedOnDay(key);
    const complete = isDayComplete(key);
    const rest = isDayRest(key);
    const day = state.days[key];

    const sessions = (day.logged || []).map(l => {
      const sub = getSubject(l.subjectId);
      if (!sub) return '';
      return `<div class="session-row" style="margin-bottom:4px"><div class="dot" style="background:${sub.color}"></div><div class="session-info">${sub.name} — ${formatHM(l.duration)}</div></div>`;
    }).join('');

    const badge = rest ? `<span class="badge badge-gray">Rest Day</span>` : complete ? `<span class="badge badge-success">✓ Complete</span>` : `<span class="badge badge-warn">${Math.round(logged / (planned || 1) * 100)}%</span>`;

    return `<div class="hist-day">
      <div class="hist-day-header" onclick="this.nextSibling.classList.toggle('open')">
        <div style="display:flex;align-items:center;gap:12px">
          ${badge}
          <span style="font-size:13px">${label}</span>
        </div>
        <span style="font-size:11px;color:var(--text3)">${rest ? 'Rest' : `${formatHM(logged)} / ${formatHM(planned)}`}</span>
      </div>
      <div class="hist-day-content">${sessions || '<div style="padding:8px 0;font-size:12px;color:var(--text3)">No sessions logged.</div>'}</div>
    </div>`;
  }).join('');
}

// --- MODALS ---
function openModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').style.display = 'none';
  }
}

function closeModalForce() {
  document.getElementById('modal-overlay').style.display = 'none';
}

function openNewSubjectModal() {
  const colorDots = COLORS.map((c, i) => `<div class="color-dot${i===0?' selected':''}" style="background:${c}" data-color="${c}" onclick="selectColor(this)"></div>`).join('');
  openModal(`<h3>New Subject</h3>
    <div class="form-group"><label>Name</label><input type="text" id="subj-name" placeholder="e.g. Mathematics" /></div>
    <div class="form-group"><label>Color</label><div class="color-picker" id="color-picker">${colorDots}</div></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModalForce()">Cancel</button>
      <button class="btn btn-primary" onclick="createSubject()">Create Subject</button>
    </div>`);
  setTimeout(() => document.getElementById('subj-name').focus(), 50);
}

function selectColor(el) {
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
}

function createSubject() {
  const name = document.getElementById('subj-name').value.trim();
  if (!name) { showNotif('Error', 'Please enter a subject name.'); return; }
  const colorEl = document.querySelector('.color-dot.selected');
  const color = colorEl ? colorEl.dataset.color : COLORS[0];
  state.subjects.push({ id: state.nextSubjectId++, name, color, archived: false, createdAt: Date.now() });
  save(); closeModalForce(); render();
  showNotif('Subject created', `"${name}" added to your subjects.`);
}

function openDayModal(key) {
  const d = keyToDate(key);
  const label = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  const today = todayKey();
  const isPast = key < today;
  const day = getDay(key);
  const active = state.subjects.filter(s => !s.archived);

  const subjectOpts = active.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

  const existingSessions = [...(day.planned || []).map(p => ({...p, isRollover:false})), ...(day.rollovers || []).map(r => ({...r, isRollover:true}))].map((p, i) => {
    const sub = getSubject(p.subjectId);
    if (!sub) return '';
    const logged = getLoggedForSubjectOnDay(key, p.subjectId);
    return `<div class="session-row" style="margin-bottom:6px">
      <div class="dot" style="background:${sub.color}"></div>
      <div class="session-info">
        ${sub.name} — ${formatHM(p.duration)}
        ${p.isRollover ? `<span class="rollover-tag">rollover</span>` : ''}
        ${p.startTime ? `<span style="color:var(--text3)"> @ ${p.startTime}</span>` : ''}
        ${isPast ? `<span style="color:var(--text3)"> · logged: ${formatHM(logged)}</span>` : ''}
      </div>
      ${!isPast && !p.isRollover ? `<button class="btn btn-ghost btn-sm" onclick="removeSession('${key}',${i})">×</button>` : ''}
    </div>`;
  }).join('');

  const milestones = (day.milestones || []).map((m, i) => `<div class="cal-milestone" style="margin-bottom:6px">🎯 ${m.label} <button class="btn btn-ghost btn-sm" onclick="removeMilestone('${key}',${i})">×</button></div>`).join('');

  const addForm = isPast ? '' : `
    <div style="border-top:1px solid var(--border);padding-top:16px;margin-top:16px">
      <div style="font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Add Session</div>
      <div class="form-row">
        <div class="form-group"><label>Subject</label><select id="plan-subject">${subjectOpts}</select></div>
        <div class="form-group"><label>Duration (hours)</label><input type="number" id="plan-dur" placeholder="1.5" min="0.1" step="0.25" /></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Start Time (optional)</label><input type="time" id="plan-time" /></div>
        <div class="form-group"><label>Notes (optional)</label><input type="text" id="plan-notes" placeholder="e.g. Chapter 4-6" /></div>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="addSession('${key}')">Add Session</button>
    </div>`;

  openModal(`<h3>${label}</h3>
    <div style="margin-bottom:12px">${existingSessions || '<div style="font-size:12px;color:var(--text3);margin-bottom:8px">No sessions planned.</div>'}</div>
    ${milestones}
    ${addForm}
    <div class="modal-actions">
      ${!isPast ? `<button class="btn btn-ghost btn-sm" onclick="openMilestoneModal('${key}')">+ Milestone</button>` : ''}
      <div style="flex:1"></div>
      <button class="btn btn-ghost" onclick="closeModalForce()">Close</button>
    </div>`);
}

function addSession(key) {
  const subjectId = parseInt(document.getElementById('plan-subject').value);
  const dur = parseFloat(document.getElementById('plan-dur').value);
  const startTime = document.getElementById('plan-time').value;
  const notes = document.getElementById('plan-notes').value.trim();

  if (!subjectId || isNaN(dur) || dur <= 0) { showNotif('Error', 'Please select a subject and duration.'); return; }

  const day = getDay(key);
  day.planned = day.planned || [];
  day.planned.push({ subjectId, duration: Math.round(dur * 3600), startTime: startTime || null, notes: notes || null });
  save();
  scheduleNotifications();
  closeModalForce();
  render();
  showNotif('Session planned', `Session added to ${key === todayKey() ? 'today' : key}`);
}

function removeSession(key, idx) {
  const day = getDay(key);
  day.planned.splice(idx, 1);
  save(); closeModalForce(); render();
}

function openMilestoneModal(key) {
  openModal(`<h3>Add Milestone</h3>
    <div class="form-group"><label>Label</label><input type="text" id="milestone-label" placeholder="e.g. Biology Exam" /></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModalForce()">Cancel</button>
      <button class="btn btn-primary" onclick="addMilestone('${key}')">Add Milestone</button>
    </div>`);
  setTimeout(() => document.getElementById('milestone-label').focus(), 50);
}

function addMilestone(key) {
  const label = document.getElementById('milestone-label').value.trim();
  if (!label) return;
  const day = getDay(key);
  day.milestones = day.milestones || [];
  day.milestones.push({ label, at: Date.now() });
  save(); closeModalForce(); render();
}

function removeMilestone(key, idx) {
  const day = getDay(key);
  day.milestones.splice(idx, 1);
  save(); closeModalForce(); render();
}

// --- INIT ---
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => setView(btn.dataset.view));
});

// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

// Set calendar to today
calYear = new Date().getFullYear();
calMonth = new Date().getMonth();

processRollovers();
render();
scheduleNotifications();

// Resume timer tick if running
if (state.timer.running && !state.timer.paused) {
  startTimerTick();
}
</script>
</body>
</html>
